! Sample Cisco IOS config - mid-remediation access switch, partially hardened
!
version 15.2
service password-encryption
no ip source-route
!
hostname PHX-RS-AC03
!
enable secret 9 $9$8jK1zR4tQ9x...redacted...
!
username svc-backup privilege 1 secret 9 $9$abcXYZ...
username netadmin privilege 15 secret 9 $9$qz81...redacted...
!
aaa new-model
aaa authentication login default local
!
ip http server
!
ip ssh version 2
!
snmp-server community Tr0ub4dor RO
!
logging buffered 4096
!
spanning-tree mode rapid-pvst
!
interface GigabitEthernet0/1
 switchport mode trunk
 switchport trunk native vlan 1
!
interface GigabitEthernet0/2
 description USER-ACCESS
 switchport mode access
 switchport access vlan 20
!
interface GigabitEthernet0/3
 description USER-ACCESS
 switchport mode access
 switchport access vlan 20
 switchport port-security
 switchport port-security maximum 2
!
interface GigabitEthernet0/4
 description UNUSED
 switchport mode access
!
banner motd ^C
Authorized access only.
^C
!
line con 0
 exec-timeout 0 0
line vty 0 4
 exec-timeout 30 0
 transport input ssh
line vty 5 15
 transport input ssh
!
end
