! Sample Cisco IOS config - hardened data center switch, CIS v8 aligned baseline
!
version 15.2
service timestamps log datetime msec localtime show-timezone
service password-encryption
no service tcp-small-servers
no service udp-small-servers
no service finger
no ip source-route
no cdp run
!
hostname PHX-DC1-SW02
!
enable secret 9 $9$5xK2hB7vQ3z8...redacted...
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
aaa accounting commands 15 default start-stop group tacacs+
!
login block-for 120 attempts 5 within 60
!
username netadmin privilege 15 secret 9 $9$qz81...redacted...
!
tacacs server PRIMARY-TACACS
 address ipv4 10.1.1.50
 key 7 094F471A1A0A
!
no ip http server
ip http secure-server
!
ip ssh version 2
ip ssh time-out 60
!
ip access-list standard MGMT-IN
 permit 10.1.1.0 0.0.0.255
!
snmp-server group MONITORING v3 priv
snmp-server user nms-svc MONITORING v3 auth sha cisco123auth priv aes 128 cisco123priv
!
logging host 10.1.1.60
logging trap informational
logging buffered 32768
logging facility local6
!
ntp server 10.1.1.10 prefer
!
ip dhcp snooping
ip dhcp snooping vlan 10,20,30
ip arp inspection vlan 10,20,30
!
spanning-tree mode rapid-pvst
spanning-tree portfast bpduguard default
!
interface TenGigabitEthernet1/1
 description UPLINK-TO-CORE
 switchport mode trunk
 switchport trunk native vlan 999
 ip proxy-arp
 no ip proxy-arp
!
interface GigabitEthernet1/1
 description USER-ACCESS
 switchport mode access
 switchport access vlan 10
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 spanning-tree bpduguard enable
!
interface GigabitEthernet1/2
 description USER-ACCESS
 switchport mode access
 switchport access vlan 10
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
!
interface GigabitEthernet1/24
 description UNUSED-PORT
 switchport mode access
 switchport access vlan 999
 shutdown
!
banner motd ^C
Authorized access only. All activity on this device may be monitored,
recorded, and reported to law enforcement. Disconnect immediately if
you are not an authorized user.
^C
!
line con 0
 exec-timeout 5 0
 login authentication default
line vty 0 15
 access-class MGMT-IN in
 exec-timeout 10 0
 transport input ssh
 login authentication default
!
end
